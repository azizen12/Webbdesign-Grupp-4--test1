<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Webbdesign Grupp 4</title>
    <link rel="stylesheet" href="/css/style.css">
    <script type="module" src="/components/site-header.js"></script>
    <script type="module" src="/components/site-nav.js"></script>
    <script type="module" src="/components/site-footer.js"></script>
</head>
<body>
    <site-header></site-header>
    <site-nav></site-nav>

    <main class="container">
        <section class="contact-section">
            <h1>Contact Us</h1>
            <p>Fill out the form below and we'll get back to you soon.</p>

            <form action="/contact" method="POST" class="contact-form">
                <div class="form-group">
                    <label for="name">Name <span class="required">*</span></label>
                    <input type="text" id="name" name="name" placeholder="Enter your name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email <span class="required">*</span></label>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required>
                </div>

                <div class="form-group">
                    <label for="message">Message <span class="required">*</span></label>
                    <textarea id="message" name="message" rows="5" placeholder="Enter your message" required></textarea>
                </div>

                <button type="submit" class="btn">Send Message</button>
            </form>
        </section>
    </main>

    <site-footer></site-footer>

    <script src="/js/main.js"></script>
</body>
</html>
